name: Deploy web app to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - name: Prepare static site
        run: |
          mkdir -p _site/assets _site/vendor
          cp index.html app.mjs web-core.mjs styles.css sw.js manifest.webmanifest _site/
          cp assets/icon.svg _site/assets/
          cp vendor/qrcode.js _site/vendor/
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site
      - id: deployment
        uses: actions/deploy-pages@v4
